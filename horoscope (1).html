<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Звёздный прогноз на неделю</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --night: #07051a; --purple: #534AB7; --purple-light: #7F77DD;
    --purple-pale: rgba(127,119,221,0.18); --teal: #1D9E75;
    --teal-pale: rgba(29,158,117,0.18); --text: #e2d9ff;
    --text-muted: #9b8fd4; --text-dim: #5c4f8a;
    --border: rgba(127,119,221,0.2); --border-hover: rgba(127,119,221,0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { min-height: 100%; }
  body { background: var(--night); color: var(--text); font-family: 'Inter', sans-serif; overflow-x: hidden; }
  canvas#sky { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .page { position: relative; z-index: 1; max-width: 560px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

  .hero { text-align: center; margin-bottom: 2.5rem; }
  .hero-glyph { font-family: 'Cormorant Garamond', serif; font-size: 64px; line-height: 1; color: var(--purple-light); display: block; margin-bottom: 0.75rem; animation: floatY 4s ease-in-out infinite; }
  @keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(26px, 6vw, 34px); font-weight: 400; line-height: 1.25; color: var(--text); margin-bottom: 8px; }
  .hero p { font-size: 14px; color: var(--text-muted); letter-spacing: 0.04em; }

  .section { margin-bottom: 1.75rem; }
  .label { font-size: 10px; letter-spacing: 0.15em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 10px; display: block; }

  .pills { display: flex; gap: 10px; }
  .pill {
    flex: 1; padding: 13px 10px; text-align: center;
    border-radius: 10px; font-size: 15px; cursor: pointer;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-muted); transition: background 0.15s, border-color 0.15s, color 0.15s;
    touch-action: manipulation; user-select: none;
  }
  .pill:active { opacity: 0.7; }
  .pill.active { border-color: var(--purple); background: var(--purple-pale); color: var(--text); }

  .sign-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  @media(max-width: 380px) { .sign-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; } }

  .sign {
    padding: 10px 4px; border-radius: 10px; cursor: pointer;
    border: 1px solid var(--border); background: transparent;
    text-align: center; transition: background 0.15s, border-color 0.15s;
    touch-action: manipulation; user-select: none;
  }
  .sign:active { opacity: 0.7; }
  .sign.active { border-color: var(--teal); background: var(--teal-pale); }
  .sign-emoji { font-size: 20px; display: block; margin-bottom: 3px; }
  .sign-name { font-size: 11px; color: var(--text); font-weight: 500; }
  .sign-dates { font-size: 9px; color: var(--text-dim); margin-top: 2px; }
  .sign.active .sign-name { color: #9FE1CB; }

  .go-btn {
    width: 100%; padding: 15px; border-radius: 12px;
    font-size: 16px; font-weight: 500;
    border: 1px solid var(--purple); background: var(--purple);
    color: #fff; cursor: pointer; transition: background 0.15s, border-color 0.15s;
    margin-top: 0.5rem; touch-action: manipulation; user-select: none;
  }
  .go-btn:active { background: var(--purple-light); }
  .go-btn:disabled { opacity: 0.25; cursor: not-allowed; }

  .result-card {
    border-radius: 16px; padding: 1.75rem;
    border: 1px solid var(--border);
    background: rgba(14,10,46,0.88);
    animation: fadeUp 0.45s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .result-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1.25rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); }
  .result-emoji { font-size: 44px; line-height: 1; flex-shrink: 0; }
  .result-sign { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 400; color: var(--text); }
  .result-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; letter-spacing: 0.06em; }
  .result-body { font-family: 'Cormorant Garamond', serif; font-size: clamp(16px, 4vw, 18px); line-height: 1.8; color: #d4c8ff; }
  .result-body p { margin-bottom: 1rem; }
  .result-body p:last-child { margin: 0; padding-top: 0.75rem; border-top: 1px solid var(--border); color: #9FE1CB; font-style: italic; font-size: clamp(14px, 3.5vw, 16px); }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.5rem 0; }
  .reset { text-align: center; font-size: 14px; color: var(--text-dim); cursor: pointer; transition: color 0.2s; padding: 8px; touch-action: manipulation; }
  .reset:active { color: var(--text-muted); }
</style>
</head>
<body>
<canvas id="sky"></canvas>
<div class="page">
  <div class="hero">
    <span class="hero-glyph">✦</span>
    <h1>Звёздный прогноз<br>на эту неделю</h1>
    <p>Звёзды уже знают, как пройдёт твоя неделя</p>
  </div>

  <div id="form-block">
    <div class="section">
      <span class="label">Ваш пол</span>
      <div class="pills" id="gender-pills">
        <div class="pill" data-val="female">Женский</div>
        <div class="pill" data-val="male">Мужской</div>
      </div>
    </div>
    <div class="section">
      <span class="label">Знак зодиака</span>
      <div class="sign-grid" id="sign-grid"></div>
    </div>
    <button class="go-btn" id="go-btn" disabled>Узнать свой прогноз ✦</button>
  </div>

  <div id="result-block" style="display:none;"></div>
</div>

<script>
const SIGNS = [
  {name:"Овен",     emoji:"♈",dates:"21.03–19.04"},
  {name:"Телец",    emoji:"♉",dates:"20.04–20.05"},
  {name:"Близнецы", emoji:"♊",dates:"21.05–20.06"},
  {name:"Рак",      emoji:"♋",dates:"21.06–22.07"},
  {name:"Лев",      emoji:"♌",dates:"23.07–22.08"},
  {name:"Дева",     emoji:"♍",dates:"23.08–22.09"},
  {name:"Весы",     emoji:"♎",dates:"23.09–22.10"},
  {name:"Скорпион", emoji:"♏",dates:"23.10–21.11"},
  {name:"Стрелец",  emoji:"♐",dates:"22.11–21.12"},
  {name:"Козерог",  emoji:"♑",dates:"22.12–19.01"},
  {name:"Водолей",  emoji:"♒",dates:"20.01–18.02"},
  {name:"Рыбы",     emoji:"♓",dates:"19.02–20.03"},
];

const H = {
female: {
"Овен": `Эта неделя открывается для тебя как утро в пятницу — с предвкушением чего-то очень хорошего. Марс заряжает твою речь магнетизмом: каждое слово попадает точно в цель, а в каждом диалоге ты чувствуешь себя уверенно и на своём месте.\n\nКлиенты сами тянутся к тебе — как будто Венера рассылает им твои координаты. Несколько человек, которые долго думали, наконец решатся. Сделки создаются легко, а активации идут одна за другой: клиенты вносят первый платёж с облегчением и благодарностью.\n\nТвоя энергия на пике. Позволь себе быть чуть более уверенной в диалогах — интуиция не подведёт. Коллеги смотрят на тебя с восхищением, руководство — с интересом.\n\n⭐ Совет звёзд: Первый диалог утром — самый важный. Именно он задаст тон всей неделе.`,

"Телец": `Звёзды выстроились в твою пользу красивой дугой — прямо как цифра плана, которую ты уже почти закрыла. Венера благословляет твою неделю теплотой: ты излучаешь спокойную уверенность, которая буквально успокаивает тревожных клиентов и располагает их к открытому разговору.\n\nЛояльные клиенты идут к тебе, потому что чувствуют: ты не продаёшь — ты помогаешь. Сделки будут создаваться неспешно, но верно. А активации — те, ради которых всё затевалось — придут от клиентов, которые наконец выдохнут и сделают первый шаг.\n\nТвоя суперсила сейчас — слушать. Дай клиенту выговориться в диалоге, и он сам придёт к нужному решению. Бонус по итогам месяца уже смотрит на тебя с интересом.\n\n⭐ Совет звёзд: Не торопи паузу в диалоге — именно в ней клиент принимает решение.`,

"Близнецы": `Меркурий в ударе, и ты вместе с ним. Слова льются рекой, аргументы выстраиваются сами, а переход от «я подумаю» к «отправьте ссылку» занимает у тебя ровно два предложения. Коллеги будут учиться на твоих диалогах.\n\nНа этой неделе к тебе потянутся клиенты, которые уже устали бояться и хотят наконец решить вопрос. Ты умеешь говорить о сложном легко и без страха — и это твой главный козырь. Несколько активаций пройдут в режиме «поговорили утром — первый платёж к вечеру».\n\nТвоя энергия распределяется эффективно: успеваешь всё и не устаёшь. Руководство заметит твои результаты — и не только заметит.\n\n⭐ Совет звёзд: Расскажи одну живую историю клиента — это убеждает лучше любой презентации.`,

"Рак": `Луна покровительствует тебе всю неделю: ты интуитивно понимаешь, что нужно клиенту, ещё до того, как он сам это осознал. В каждом диалоге ты создаёшь атмосферу безопасности — и люди это чувствуют.\n\nКлиенты, которые пришли с недоверием, уходят с созданной сделкой и благодарностью. Активации на этой неделе будут особенными: клиенты вносят первый платёж с ощущением, что сделали правильный выбор — и это твоя заслуга.\n\nНе забывай о себе: такая отдача требует восполнения. Но сначала — сильная неделя. Звёзды обещают, что усилия будут замечены и вознаграждены в самый нужный момент.\n\n⭐ Совет звёзд: «Я понимаю вас» — три слова, которые открывают любого клиента.`,

"Лев": `Солнце светит прямо на тебя — как прожектор на главную звезду сцены. На этой неделе ты в своей стихии: уверенная, яркая, притягательная. Клиенты хотят работать именно с тобой — не просто с компанией, а лично с тобой.\n\nНесколько клиентов созрели именно сейчас и ждут только твоего диалога. Сделки создаются легко, активации идут одна за другой. Один довольный клиент уже порекомендовал тебя троим знакомым — жди тёплых входящих.\n\nПо итогам недели твоё имя прозвучит на планёрке в самом лучшем контексте. Прими это достойно — ты заслужила.\n\n⭐ Совет звёзд: Начни день с самого сложного диалога — после него всё остальное покажется лёгким.`,

"Дева": `Меркурий и твоя природная точность объединились в мощный профессиональный союз. На этой неделе ты видишь ситуацию клиента насквозь, задаёшь именно те вопросы, которые нужны, и объясняешь следующий шаг так чётко, что клиент сам просит ссылку на оплату.\n\nЛояльные клиенты ценят твою основательность и рекомендуют тебя, потому что ты не обещаешь лишнего. Сделки создаются чётко, активации проходят без сучка и задоринки. Небольшая деталь, которую ты не упустишь в диалоге, решит исход одной ключевой недели.\n\nТвоя аккуратность в работе с клиентами сейчас особенно заметна руководству. Жди признания.\n\n⭐ Совет звёзд: Подготовь ответы на три главных возражения заранее — и они не застанут тебя врасплох.`,

"Весы": `Венера дарит тебе редкое сочетание: обаяние и убедительность одновременно. Ты находишь нужные слова, создаёшь атмосферу доверия и мягко приводишь клиента к решению, которое хорошо для него — и отлично для плана.\n\nНесколько клиентов, которые сомневались, выберут именно тебя — потому что с тобой приятно говорить. Сделки будут создаваться в тёплой атмосфере, активации — легко и с благодарностью. Один диалог на этой неделе окажется неожиданно результативным.\n\nТы умеешь балансировать между настойчивостью и деликатностью — и именно это сейчас твой главный инструмент. Команда замечает твой стиль.\n\n⭐ Совет звёзд: Улыбка слышна в диалоге — не забывай об этом в каждом разговоре.`,

"Скорпион": `Плутон усиливает твою природную интуицию до уровня суперспособности. На этой неделе ты чувствуешь клиента на несколько шагов вперёд — знаешь, когда надавить, когда отступить, и в какой момент предложить перейти к оформлению.\n\nЛояльные клиенты идут к тебе осознанно — они уже решили, просто ждали именно тебя. Несколько сложных диалогов завершатся созданной сделкой и активацией благодаря твоему умению держать паузу и слышать между строк.\n\nТвоя целеустремлённость на этой неделе вдохновляет всю команду. Результаты говорят сами за себя. Маленький бонус или приятный сюрприз от руководства вполне возможен к пятнице.\n\n⭐ Совет звёзд: Задай клиенту один вопрос о его главном страхе — и ты получишь ключ к сделке.`,

"Стрелец": `Юпитер в твоей стороне — а значит удача, масштаб и лёгкость. На этой неделе ты работаешь в потоке: диалоги приносят результат быстрее обычного, клиенты оказываются открытее, а нужные люди появляются в нужный момент.\n\nТвой оптимизм — это не просто настроение, это инструмент. Клиенты чувствуют, что ты веришь в то, что делаешь, и это передаётся. Сделки создаются на одном дыхании, активации идут бодро. Один неожиданный клиент может стать твоим лучшим кейсом месяца.\n\nНе бойся замахиваться на большее — эта неделя поддержит смелость.\n\n⭐ Совет звёзд: Расскажи клиенту, как изменится его жизнь после — не про процедуру, а про свободу.`,

"Козерог": `Сатурн смотрит на тебя с одобрением: твоя система, дисциплина и умение работать на результат сейчас приносят особенно весомые плоды. Всё, что ты выстраивала — репутацию, подход, доверие клиентов — начинает давать урожай именно сейчас.\n\nКлиенты, которые давно думают, наконец созрели — и пишут именно тебе. Несколько обращений придут по рекомендации. Сделки создаются по плану, активации — с опережением.\n\nТвоя методичность — конкурентное преимущество. Пока другие импровизируют, ты работаешь системно, и результат виден всем вокруг. Руководство ценит именно таких людей.\n\n⭐ Совет звёзд: Сделай на одно касание больше, чем планировала — именно оно может стать решающим.`,

"Водолей": `Уран дарит тебе свежий взгляд на привычные ситуации. На этой неделе ты находишь нестандартные подходы к клиентам, которые, казалось, уже сказали «нет» — и превращаешь их в «да, отправьте ссылку».\n\nТвоя способность говорить о сложном просто — редкий дар. Клиенты, уставшие от непонятных объяснений, находят в тебе человека, которому можно доверять. Сделки создаются с облегчением, активации — с благодарностью. Один нестандартный диалог удивит даже тебя саму.\n\nТвои подходы замечают коллеги — кто-то уже перенимает твой стиль. Это лучший комплимент.\n\n⭐ Совет звёзд: Не бойся сказать что-то неожиданное — именно это запомнится клиенту.`,

"Рыбы": `Нептун окутывает твою неделю особой атмосферой: ты чувствуешь клиента сердцем — понимаешь его боль, его страх, его надежду. Это делает тебя не просто специалистом, а человеком, который по-настоящему меняет жизни.\n\nЛюди это чувствуют и тянутся к тебе. Несколько клиентов, которые обращались раньше и не решились, вернутся именно на этой неделе — и теперь они готовы. Сделки будут создаваться с теплотой. Активации — с ощущением, что человек сделал важный шаг.\n\nТвоя эмпатия — это мощный рабочий инструмент, и сейчас он на пике. Результаты приятно удивят и тебя, и руководство.\n\n⭐ Совет звёзд: Скажи клиенту «вы сделали правильный шаг» — людям нужно это услышать.`
},
male: {
"Овен": `Марс — твой личный генеральный директор на этой неделе — выдал тебе неограниченный кредит энергии и фокуса. Ты в боевом режиме: собранный, быстрый, убедительный. Клиенты чувствуют твою уверенность и хотят быть рядом с человеком, который знает, что делает.\n\nНесколько сделок, которые висели в воздухе, закроются именно на этой неделе — и именно благодаря твоему настойчивому, но корректному follow-up в диалогах. Активации идут чисто: клиенты вносят первый платёж и благодарят. Звёзды говорят: до пятницы план будет закрыт.\n\nТвоя энергия заряжает команду — несколько коллег сегодня работают лучше, просто находясь рядом с тобой.\n\n⭐ Совет звёзд: Первый диалог утром — самый важный. Именно он задаст тон всей неделе.`,

"Телец": `Венера и Сатурн объединились, чтобы подарить тебе неделю стабильных и весомых результатов. Ты работаешь без суеты, но с результатом — и именно это сейчас привлекает правильных клиентов.\n\nЛояльные клиенты идут к тебе, потому что доверяют: ты не давишь, не торопишь, но всегда доводишь дело до конца. В диалогах ты спокоен и уверен. Сделки создаются надёжно, активации приходят от клиентов, которые наконец выдохнули и сделали первый шаг.\n\nОдин клиент уже рекомендовал тебя другу — жди неожиданного входящего. Бонус по итогам месяца смотрит на тебя с симпатией.\n\n⭐ Совет звёзд: Не торопи паузу в диалоге — именно в ней клиент принимает решение.`,

"Близнецы": `Меркурий в ударе, и ты вместе с ним. Слова льются рекой, аргументы выстраиваются сами, а переход от «я подумаю» к «отправьте ссылку» занимает у тебя ровно два предложения. Коллеги будут учиться на твоих диалогах.\n\nНа этой неделе к тебе потянутся клиенты, которые уже устали бояться и хотят наконец решить вопрос. Ты умеешь говорить о сложном легко и без страха — и это твой главный козырь. Несколько активаций пройдут в режиме «поговорили утром — первый платёж к вечеру».\n\nТвоя энергия распределяется эффективно: успеваешь всё и не устаёшь. Руководство заметит твои результаты — и не только заметит.\n\n⭐ Совет звёзд: Расскажи одну живую историю клиента — это убеждает лучше любой презентации.`,

"Рак": `Луна покровительствует тебе всю неделю: ты интуитивно понимаешь, что нужно клиенту, ещё до того, как он сам это осознал. В каждом диалоге ты создаёшь ощущение безопасности — и люди это чувствуют.\n\nКлиенты, которые пришли с недоверием, уходят с созданной сделкой и благодарностью. Активации на этой неделе особенные: клиенты вносят первый платёж с ощущением, что сделали правильный выбор — и это твоя заслуга.\n\nТвой подход — через человечность — сейчас особенно ценен. Звёзды обещают, что усилия будут замечены и вознаграждены в самый нужный момент.\n\n⭐ Совет звёзд: «Я понимаю вас» — три слова, которые открывают любого клиента.`,

"Лев": `Солнце светит прямо на тебя — как прожектор на главную звезду сцены. На этой неделе ты в своей стихии: уверенный, харизматичный, притягательный. Клиенты хотят работать именно с тобой — не просто с компанией, а лично с тобой.\n\nНесколько клиентов созрели именно сейчас и ждут только твоего диалога. Сделки создаются легко, активации идут одна за другой. Один довольный клиент уже порекомендовал тебя двум знакомым — жди тёплых входящих.\n\nПо итогам недели твоё имя прозвучит на планёрке в самом лучшем контексте. Прими это как должное — ты заработал.\n\n⭐ Совет звёзд: Начни день с самого сложного диалога — после него всё остальное покажется лёгким.`,

"Дева": `Меркурий и твоя природная точность объединились в мощный профессиональный союз. На этой неделе ты видишь ситуацию клиента насквозь, задаёшь именно те вопросы, которые нужны, и объясняешь следующий шаг так чётко, что клиент сам просит ссылку на оплату.\n\nЛояльные клиенты ценят твою основательность и рекомендуют тебя, потому что ты не обещаешь лишнего. Сделки создаются чётко, активации проходят без сучка и задоринки. Небольшая деталь, которую ты не упустишь в диалоге, решит исход одного ключевого разговора.\n\nТвоя аккуратность в работе с клиентами сейчас особенно заметна руководству. Жди признания.\n\n⭐ Совет звёзд: Подготовь ответы на три главных возражения заранее — и они не застанут тебя врасплох.`,

"Весы": `Венера дарит тебе редкое сочетание: обаяние и убедительность одновременно. Ты находишь нужные слова, создаёшь атмосферу доверия и мягко приводишь клиента к решению, которое хорошо для него — и отлично для плана.\n\nНесколько клиентов, которые сомневались, выберут именно тебя — потому что с тобой приятно говорить. Сделки будут создаваться в тёплой атмосфере, активации — легко и с благодарностью. Один диалог на этой неделе окажется неожиданно результативным.\n\nТы умеешь балансировать между настойчивостью и деликатностью — и именно это сейчас твой главный инструмент.\n\n⭐ Совет звёзд: Улыбка слышна в диалоге — не забывай об этом в каждом разговоре.`,

"Скорпион": `Плутон усиливает твою природную интуицию до уровня суперспособности. На этой неделе ты чувствуешь клиента на несколько шагов вперёд — знаешь, когда надавить, когда отступить, и в какой момент предложить перейти к оформлению.\n\nЛояльные клиенты идут к тебе осознанно — они уже решили, просто ждали именно тебя. Несколько сложных диалогов завершатся созданной сделкой и активацией благодаря твоему умению держать паузу и слышать между строк.\n\nТвоя целеустремлённость вдохновляет всю команду. Результаты говорят сами за себя. Маленький бонус или приятный сюрприз от руководства вполне возможен к пятнице.\n\n⭐ Совет звёзд: Задай клиенту один вопрос о его главном страхе — и ты получишь ключ к сделке.`,

"Стрелец": `Юпитер в твоей стороне — а значит удача, масштаб и лёгкость. На этой неделе ты работаешь в потоке: диалоги приносят результат быстрее обычного, клиенты оказываются открытее, а нужные люди появляются в нужный момент.\n\nТвой оптимизм — это не просто настроение, это инструмент. Клиенты чувствуют, что ты веришь в то, что делаешь, и это передаётся. Сделки создаются на одном дыхании, активации идут бодро. Один неожиданный клиент может стать твоим лучшим кейсом месяца.\n\nНе бойся замахиваться на большее — эта неделя поддержит смелость.\n\n⭐ Совет звёзд: Расскажи клиенту, как изменится его жизнь после — не про процедуру, а про свободу.`,

"Козерог": `Сатурн смотрит на тебя с одобрением: твоя система, дисциплина и умение работать на результат сейчас приносят особенно весомые плоды. Всё, что ты выстраивал — репутацию, подход, доверие клиентов — начинает давать урожай именно сейчас.\n\nКлиенты, которые давно думают, наконец созрели — и пишут именно тебе. Несколько обращений придут по рекомендации. Сделки создаются по плану, активации — с опережением.\n\nТвоя методичность — конкурентное преимущество. Пока другие импровизируют, ты работаешь системно, и это видят все. Руководство ценит именно таких людей.\n\n⭐ Совет звёзд: Сделай на одно касание больше, чем планировал — именно оно может стать решающим.`,

"Водолей": `Уран дарит тебе свежий взгляд на привычные ситуации. На этой неделе ты находишь нестандартные подходы к клиентам, которые, казалось, уже сказали «нет» — и превращаешь их в «да, отправьте ссылку».\n\nТвоя способность говорить о сложном просто — редкий дар. Клиенты, уставшие от непонятных объяснений, находят в тебе человека, которому можно доверять. Сделки создаются с облегчением, активации — с благодарностью. Один нестандартный диалог удивит даже тебя самого.\n\nТвои подходы замечают коллеги — кто-то уже перенимает твой стиль. Это лучший комплимент.\n\n⭐ Совет звёзд: Не бойся сказать что-то неожиданное — именно это запомнится клиенту.`,

"Рыбы": `Нептун окутывает твою неделю особой атмосферой: ты чувствуешь клиента сердцем — понимаешь его боль, его страх, его надежду. Это делает тебя не просто специалистом, а человеком, который по-настоящему меняет жизни.\n\nЛюди это чувствуют и тянутся к тебе. Несколько клиентов, которые обращались раньше и не решились, вернутся именно на этой неделе — и теперь они готовы. Сделки будут создаваться с теплотой. Активации — с ощущением, что человек сделал важный шаг.\n\nТвоя эмпатия — это мощный рабочий инструмент, и сейчас он на пике. Результаты приятно удивят и тебя, и руководство.\n\n⭐ Совет звёзд: Скажи клиенту «вы сделали правильный шаг» — людям нужно это услышать.`
}
};

let gender = null, sign = null;

// Build sign grid
const grid = document.getElementById('sign-grid');
SIGNS.forEach(s => {
  const d = document.createElement('div');
  d.className = 'sign';
  d.innerHTML = `<span class="sign-emoji">${s.emoji}</span><div class="sign-name">${s.name}</div><div class="sign-dates">${s.dates}</div>`;
  d.addEventListener('click', function(){ selSign(this, s.name); });
  d.addEventListener('touchend', function(e){ e.preventDefault(); selSign(this, s.name); });
  grid.appendChild(d);
});

// Gender pills
document.querySelectorAll('#gender-pills .pill').forEach(el => {
  el.addEventListener('click', function(){ selGender(this); });
  el.addEventListener('touchend', function(e){ e.preventDefault(); selGender(this); });
});

// Go button
const goBtn = document.getElementById('go-btn');
goBtn.addEventListener('click', showResult);
goBtn.addEventListener('touchend', function(e){ e.preventDefault(); showResult(); });

function selGender(el) {
  document.querySelectorAll('#gender-pills .pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  gender = el.dataset.val;
  check();
}
function selSign(el, name) {
  document.querySelectorAll('#sign-grid .sign').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  sign = name;
  check();
}
function check() {
  goBtn.disabled = !(gender && sign);
}

function showResult() {
  if (!gender || !sign) return;
  const s = SIGNS.find(x => x.name === sign);
  const text = H[gender][sign];
  const paras = text.split('\n').filter(Boolean);

  document.getElementById('form-block').style.display = 'none';
  const rb = document.getElementById('result-block');
  rb.style.display = 'block';
  rb.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-emoji">${s.emoji}</div>
        <div>
          <div class="result-sign">${sign}</div>
          <div class="result-sub">✦ ЗВЁЗДНЫЙ ПРОГНОЗ НА НЕДЕЛЮ</div>
        </div>
      </div>
      <div class="result-body">${paras.map(p => `<p>${p}</p>`).join('')}</div>
    </div>
    <div class="divider"></div>
    <div class="reset" id="reset-btn">← Посмотреть прогноз для другого знака</div>`;

  document.getElementById('reset-btn').addEventListener('click', reset);
  document.getElementById('reset-btn').addEventListener('touchend', function(e){ e.preventDefault(); reset(); });
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function reset() {
  gender = null; sign = null;
  document.getElementById('result-block').style.display = 'none';
  document.getElementById('form-block').style.display = 'block';
  document.querySelectorAll('.pill, .sign').forEach(e => e.classList.remove('active'));
  goBtn.disabled = true;
  window.scrollTo({top: 0, behavior: 'smooth'});
}

// Starfield
(function() {
  const cv = document.getElementById('sky');
  const ctx = cv.getContext('2d');
  let W, H, stars = [], comets = [];
  function resize() {
    W = cv.width = window.innerWidth;
    H = cv.height = window.innerHeight;
    stars = Array.from({length:200}, () => ({
      x: Math.random()*W, y: Math.random()*H,
      r: Math.random()*1.2+0.2, a: Math.random()*0.7+0.2,
      da: (Math.random()-0.5)*0.007
    }));
  }
  function addComet() {
    comets.push({ x: Math.random()*W*0.7, y: Math.random()*H*0.4,
      vx: 4+Math.random()*3, vy: 1.5+Math.random()*2.5, len: 70+Math.random()*50, a: 1 });
  }
  function draw() {
    ctx.clearRect(0,0,W,H);
    stars.forEach(s => {
      s.a += s.da;
      if (s.a > 0.95 || s.a < 0.15) s.da *= -1;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(210,200,255,${s.a})`; ctx.fill();
    });
    comets = comets.filter(c => c.a > 0.02);
    comets.forEach(c => {
      const g = ctx.createLinearGradient(c.x,c.y,c.x-c.vx*c.len/8,c.y-c.vy*c.len/8);
      g.addColorStop(0,`rgba(255,255,255,${c.a})`); g.addColorStop(1,'rgba(255,255,255,0)');
      ctx.beginPath(); ctx.moveTo(c.x,c.y); ctx.lineTo(c.x-c.vx*c.len/8,c.y-c.vy*c.len/8);
      ctx.strokeStyle=g; ctx.lineWidth=1.5; ctx.stroke();
      c.x+=c.vx; c.y+=c.vy; c.a-=0.022;
    });
    requestAnimationFrame(draw);
  }
  resize(); draw();
  setInterval(addComet, 3500);
  window.addEventListener('resize', resize);
})();
</script>
